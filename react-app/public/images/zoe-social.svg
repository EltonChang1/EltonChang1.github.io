    <text x="32" y="56" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600">How taste evolves</text>
    <polyline points="32,220 110,190 188,205 266,150 344,120 408,80" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#a78bfa"><circle cx="110" cy="190" r="5"/><circle cx="266" cy="150" r="5"/><circle cx="408" cy="80" r="6"/></g>
    <line x1="32" y1="244" x2="408" y2="244" stroke="#243049" stroke-width="2"/>
  </g>
  <text x="120" y="840" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22">Design concept</text>
