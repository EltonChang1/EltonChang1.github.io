    </g>
    <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
      <g><circle cx="380" cy="130" r="46" fill="url(#accent)"/><text x="380" y="139" fill="#06101f" font-size="30" font-weight="800">You</text></g>
      <g fill="#1f2a45"><circle cx="150" cy="60" r="32"/><circle cx="120" cy="230" r="30"/><circle cx="630" cy="80" r="32"/><circle cx="660" cy="250" r="30"/><circle cx="360" cy="360" r="30"/></g>
      <g fill="#cbd5e1" font-size="22" font-weight="700"><text x="150" y="68">A</text><text x="120" y="238">B</text><text x="630" y="88">C</text><text x="660" y="258">D</text><text x="360" y="368">E</text></g>
    </g>
  </g>

  <g transform="translate(1010 320)">
