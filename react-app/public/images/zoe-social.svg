      <stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="200" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-0.03em">Taste, shared</text>
  <text x="124" y="252" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">Follow how friends and creators evolve over time</text>

  <g transform="translate(160 330)">
    <g stroke="url(#accent)" stroke-opacity="0.45" stroke-width="3" fill="none">
